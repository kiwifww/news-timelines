name: Fetch News Data

on:
  schedule:
    - cron: '0 * * * *'   # 每小时整点运行
  workflow_dispatch:        # 支持手动触发

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # 允许写入仓库

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests feedparser python-dateutil

      - name: Fetch news data
        run: python scripts/fetch_news.py

      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/
          git diff --staged --quiet || git commit -m "chore: update news data $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
